<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ميزان سولا</title>
    <style>
        :root {
            --glow-cyan: #4facfe; --neon-blue: #00f2fe; --danger: #ff4b2b; --victory: #2ecc71;
            --galaxy: linear-gradient(135deg, #3a1c71, #d76d77, #ffaf7b, #4facfe);
        }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma; background-color: #050510; color: white; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .animated-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('bg.jpd') center/cover no-repeat; z-index: -2; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); z-index: 5000; justify-content: center; align-items: center; }
        .content-box { background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); max-width: 500px; text-align: right; width: 90%; }
        .controls-top { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 1000; }
        .btn-ctrl { background: rgba(255,255,255,0.1); border: 1.5px solid rgba(255,255,255,0.2); color: white; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .logo-area { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 5px; }
        .logo-box { width: 55px; height: 55px; border: 2px solid #fff; border-radius: 12px; background: url('logo.png') center/cover no-repeat; }
        .logo-text { font-size: 3rem; font-weight: 900; background: var(--galaxy); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #setup-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(35px); z-index: 4000; display: flex; align-items: center; justify-content: center; gap: 50px; padding: 20px; }
        .rules-side { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 20px; border-right: 4px solid var(--neon-blue); width: 260px; }
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; }
        .main-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; width: 95%; max-width: 950px; padding: 25px; text-align: center; position: relative; }
        
        /* الميزان نزل بزيادة تحت */
        .balance-container { height: 80px; position: absolute; bottom: 10px; width: 100%; display: flex; justify-content: center; pointer-events: none; }
        .beam { width: 500px; height: 10px; background: #fff; position: relative; transition: 0.8s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        .cup { width: 130px; height: 65px; background: rgba(0,0,0,0.8); border: 1.5px solid #fff; border-radius: 0 0 70px 70px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-top: 20px; padding: 0 80px; }
        .num-btn { padding: 18px; font-size: 1.6rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 15px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .cat-card { padding: 12px; border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; cursor: pointer; margin: 4px 0; text-align: center; background: rgba(255,255,255,0.03); }
        .cat-card.selected { background: var(--neon-blue); color: black; font-weight: bold; }
        
        #choice-timer { font-size: 3rem; color: #ffaf7b; font-weight: 900; }
        @keyframes wasted-anim { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        #wasted-screen { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
        #wasted-title { color: red; font-size: 9rem; font-weight: 900; animation: wasted-anim 1s infinite; }
        .paused-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(15px); z-index: 2000; border-radius: 40px; align-items: center; justify-content: center; font-size: 3rem; color: gold; font-weight: bold; }
    </style>
</head>
<body>

    <div id="wasted-screen">
        <h1 id="wasted-title">WASTED</h1>
        <div id="loser-display" style="color:white; font-size:3rem; text-shadow: 0 0 30px red;"></div>
    </div>
    <div class="animated-bg"></div>

        <button class="btn-ctrl" onclick="location.reload()">رجوع</button>

                <label>حد الانفجار الشخصي:</label>

            </div>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <div id="p1-cats" style="width:150px;">

                    <div class="cat-card" onclick="setCat(1, 'كورة')">⚽ كورة</div><div class="cat-card" onclick="setCat(1, 'ثقافة')">📚 ثقافة</div>
                </div>
                <div id="p2-cats" style="width:150px;">
                    <div class="cat-card" onclick="setCat(2, 'عام')">🧠 عام</div><div class="cat-card" onclick="setCat(2, 'دين')">🕋 دين</div>
                    <div class="cat-card" onclick="setCat(2, 'كورة')">⚽ كورة</div><div class="cat-card" onclick="setCat(2, 'ثقافة')">📚 ثقافة</div>
                </div>
            </div>
            <button onclick="startGame()" style="margin-top:20px; padding:15px 80px; background:var(--victory); border:none; border-radius:50px; color:white; font-weight:bold; cursor:pointer; font-size:1.3rem;">انطلاق 🚀</button>
        </div>
    </div>

    <div class="main-card" id="game-ui" style="display:none;">
        <div id="game-paused-msg" class="paused-overlay">اللعبة متوقفة ⏸️</div>
        <div class="logo-area" style="margin-top:-10px;"><div class="logo-box"></div><h1 class="logo-text">SOLAR</h1></div>
        <div id="choice-timer">10</div>
        <h2 id="turn-txt" style="color:var(--neon-blue); margin-bottom:10px;"></h2>
        <div class="grid" id="number-grid">
            <script>for(let i=1; i<=10; i++) document.write(`<button class="num-btn" id="btn-${i}" onclick="ask(${i})">${i}</button>`);</script>
        </div>
        
        <div class="balance-container">
            <div class="beam" id="beam">
                <div class="cup" style="position:absolute; left:-10px; bottom:-65px;"><small id="label-p1"></small><b id="s1">0</b></div>
                <div class="cup" style="position:absolute; right:-10px; bottom:-65px;"><small id="label-p2"></small><b id="s2">0</b></div>
            </div>
        </div>
    </div>

    <div id="q-modal" class="overlay">

            <h2 id="q-text" style="text-align:center; line-height:1.4;"></h2>

            if(list.includes(cat)) list.splice(list.indexOf(cat), 1);

        function updateSetupUI() {

                const name = c.innerText.replace(/[^\u0621-\u064A]/g, "");

            });
        }

            document.getElementById('game-paused-msg').style.display = isPaused ? 'flex' : 'none';
        }

        function resetNumbers() {
            for(let i=1; i<=10; i++) document.getElementById(`btn-${i}`).disabled = false;
        }

        function startGame() {
            if(p1Cats.length < 2 || p2Cats.length < 2) return alert("اختاروا قسمين لكل فريق!");

            diff = document.getElementById('diff-select').value;
            
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('label-p1').innerText = p1Name;
            document.getElementById('label-p2').innerText = p2Name;
            updateTurnTxt();
            startChoiceTimer();
        }

        function ask(val) {
            if(isPaused) return;
            clearInterval(choiceInt);
            playSound('click');
            curVal = val;
            const myCats = (turn === 1 ? p1Cats : p2Cats);
            const catName = myCats[Math.floor(Math.random() * myCats.length)];
            
            let pool = masterBank[catName].filter(q => !usedQuestions[catName].includes(q.q));
            if(diff === 'easy') pool = pool.slice(0, 30);
            else if(diff === 'med') pool = pool.slice(30, 70);
            else if(diff === 'hard') pool = pool.slice(70, 100);

            if(pool.length === 0) { usedQuestions[catName] = []; pool = masterBank[catName]; }
            const q = pool[Math.floor(Math.random() * pool.length)];
            usedQuestions[catName].push(q.q);

            document.getElementById('q-cat-display').innerText = `قسم: ${catName} | القيمة: ${val}`;
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('ans-val').innerText = q.a;
            document.getElementById('ans-box').style.display = 'none';
            document.getElementById('q-modal').style.display = 'flex';
            document.getElementById(`btn-${val}`).disabled = true;
            timeRem = tLimit;
            startTimer();
        }

        function startTimer() {
            document.getElementById('q-timer').innerText = timeRem;
            clearInterval(timerInt);
            timerInt = setInterval(() => {
                if(!isPaused) {
                    timeRem--;
                    document.getElementById('q-timer').innerText = timeRem;
                    if(timeRem <= 0) { clearInterval(timerInt); handleResult(false); }
                }
            }, 1000);
        }

        function startChoiceTimer() {
            choiceRem = choiceLimit;
            document.getElementById('choice-timer').innerText = choiceRem;
            clearInterval(choiceInt);
            choiceInt = setInterval(() => {
                if(!isPaused) {
                    choiceRem--;
                    document.getElementById('choice-timer').innerText = choiceRem;
                    if(choiceRem <= 0) {
                        clearInterval(choiceInt);
                        turn = (turn === 1 ? 2 : 1);
                        updateTurnTxt();
                        startChoiceTimer();
                    }
                }
            }, 1000);
        }

        function handleResult(correct) {
            clearInterval(timerInt);
            document.getElementById('q-modal').style.display = 'none';
            scores[turn] += correct ? curVal : (curVal * 2);
            updateUI();
            
            
            if(scores[turn] >= winLimit) {
                const loser = (turn === 1 ? p1Name : p2Name);
                document.getElementById('loser-display').innerText = "الخاسر: " + loser;
                playSound('boom'); setTimeout(() => playSound('laugh'), 1000);
                document.getElementById('wasted-screen').style.display = 'flex';
                setTimeout(() => location.reload(), 8000);
            } else {
                turn = (turn === 1 ? 2 : 1);
                updateTurnTxt();
                startChoiceTimer();
            }
        }

        function updateUI() {
            document.getElementById('s1').innerText = scores[1];
            document.getElementById('s2').innerText = scores[2];
            let angle = (scores[1] - scores[2]) * -2.5;
            document.getElementById('beam').style.transform = `rotate(${angle}deg)`;
        }

        function updateTurnTxt() {
            document.getElementById('turn-txt').innerText = `دور: ${turn === 1 ? p1Name : p2Name}`;
        }
