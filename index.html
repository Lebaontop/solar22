<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ميزان سولار</title>
    <style>
        :root {
            --glow: #4facfe; --neon: #00f2fe; --danger: #ff4b2b; --victory: #2ecc71;
            --galaxy: linear-gradient(135deg, #3a1c71, #d76d77, #ffaf7b, #4facfe);
        }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma; background-color: #050510; color: white; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .animated-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('bg.jpd') center/cover no-repeat; z-index: -2; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(20px); z-index: 5000; justify-content: center; align-items: center; }
        .content-box { background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); max-width: 500px; text-align: right; width: 90%; }
        .controls-top { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 1000; }
        .btn-ctrl { background: rgba(255,255,255,0.1); border: 1.5px solid rgba(255,255,255,0.2); color: white; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .logo-area { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 10px; }
        .logo-box { width: 55px; height: 55px; border: 2px solid #fff; border-radius: 12px; background: url('logo.png') center/cover no-repeat; }
        .logo-text { font-size: 3.5rem; font-weight: 900; background: var(--galaxy); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #setup-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(35px); z-index: 4000; display: flex; align-items: center; justify-content: center; gap: 40px; padding: 20px; }
        .rules-side { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; border-right: 4px solid var(--neon); width: 230px; }
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; }
        .config-grid input, .config-grid select { background: rgba(0,0,0,0.6); color: white; border: 1px solid #444; padding: 5px; border-radius: 5px; width: 120px; }
        .main-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; width: 95%; max-width: 950px; padding: 20px; text-align: center; position: relative; }
        .balance-container { height: 110px; position: relative; display: flex; justify-content: center; align-items: flex-end; margin-bottom: 10px; }
        .beam { width: 450px; height: 10px; background: #fff; position: relative; transition: 0.8s; }
        .cup { width: 120px; height: 60px; background: rgba(0,0,0,0.7); border: 1.5px solid #fff; border-radius: 0 0 60px 60px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 0 100px; margin-top: 10px; }
        .num-btn { padding: 18px; font-size: 1.6rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 15px; cursor: pointer; font-weight: bold; }
        .num-btn:disabled { opacity: 0.1; border-color: red; }
        .cat-card { padding: 10px; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; cursor: pointer; margin: 3px 0; text-align: center; background: rgba(255,255,255,0.05); }
        .cat-card.selected { background: var(--neon); color: black; font-weight: bold; }
        @keyframes wasted-anim { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        #wasted-screen { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
        #wasted-title { color: red; font-size: 8rem; font-weight: 900; animation: wasted-anim 1s infinite; letter-spacing: 10px; }
        .rights-label { font-size: 0.85rem; opacity: 0.7; color: var(--glow); margin-top: 15px; text-align: center; width: 100%; }
    </style>
</head>
<body>

    <div id="wasted-screen">
        <h1 id="wasted-title">WASTED</h1>
        <div id="loser-display" style="color:white; font-size:3rem; text-shadow: 0 0 30px red;"></div>
    </div>
    <div class="animated-bg"></div>

    <div class="controls-top">
        <button class="btn-ctrl" onclick="togglePause()" id="pause-btn">⏸️ إيقاف</button>
        <button class="btn-ctrl" onclick="resetNumbers()">🔓 تصفير الأرقام</button>
        <button class="btn-ctrl" onclick="location.reload()">رجوع</button>
    </div>

    <div id="setup-screen">
        <div class="rules-side">
            <b style="color:var(--neon)">📜 الشروط:</b><br><br>
            <p>• الخطأ يضيف ضعف الرقم.</p>
            <p>• الحد يحسب فردياً لكل فريق.</p>
            <p>• الأسئلة لا تتكرر حتى نفاذ الـ 400.</p>
            <p>• يجب اختيار الرقم خلال الوقت.</p>
        </div>
        <div style="text-align:center;">
            <div class="logo-area"><div class="logo-box"></div><h1 class="logo-text">SOLAR</h1></div>
            <div class="config-grid">
                <label>فريق 1:</label><input type="text" id="p1-name" value="الفريق 1">
                <label>فريق 2:</label><input type="text" id="p2-name" value="الفريق 2">
                <label>وقت الاختيار:</label><input type="number" id="choice-limit-input" value="10">
                <label>وقت السؤال:</label><input type="number" id="time-limit" value="30">
                <label>الحد:</label>
                <div style="display:flex; gap:5px; align-items:center;">
                    <input type="password" id="score-limit" value="50" style="width:70px;">
                    <button onclick="toggleLimitView()" style="background:none; border:none; color:white; cursor:pointer;">👁️</button>
                </div>
                <label>المستوى:</label>
                <select id="diff-select"><option value="all">الكل</option><option value="easy">سهل</option><option value="med">متوسط</option><option value="hard">صعب</option></select>
            </div>
            <div style="display:flex; gap:15px; margin-top:15px;">
                <div id="p1-cats" style="width:140px;">
                    <div class="cat-card" onclick="setCat(1, 'عام')">🧠 عام</div><div class="cat-card" onclick="setCat(1, 'دين')">🕋 دين</div>
                    <div class="cat-card" onclick="setCat(1, 'كورة')">⚽ كورة</div><div class="cat-card" onclick="setCat(1, 'ثقافة')">📚 ثقافة</div>
                </div>
                <div id="p2-cats" style="width:140px;">
                    <div class="cat-card" onclick="setCat(2, 'عام')">🧠 عام</div><div class="cat-card" onclick="setCat(2, 'دين')">🕋 دين</div>
                    <div class="cat-card" onclick="setCat(2, 'كورة')">⚽ كورة</div><div class="cat-card" onclick="setCat(2, 'ثقافة')">📚 ثقافة</div>
                </div>
            </div>
            <button onclick="startGame()" style="margin-top:20px; padding:12px 60px; background:var(--victory); border:none; border-radius:50px; color:white; font-weight:bold; cursor:pointer;">انطلاق 🚀</button>
            <div class="rights-label">👨‍💻 Leba, AAA | 🎨 mesh</div>
        </div>
    </div>

    <div class="main-card" id="game-ui" style="display:none;">
        <div id="paused-msg" class="overlay" style="position:absolute; border-radius:40px;">لعبة متوقفة ⏸️</div>
        <div class="logo-area" style="margin-top:-20px;"><div class="logo-box"></div><h1 class="logo-text">SOLAR</h1></div>
        
        <div class="balance-container">
            <div class="beam" id="beam">
                <div class="cup" style="position:absolute; left:-10px; bottom:-65px;"><small id="label-p1"></small><b id="s1">0</b></div>
                <div class="cup" style="position:absolute; right:-10px; bottom:-65px;"><small id="label-p2"></small><b id="s2">0</b></div>
            </div>
        </div>

        <div id="choice-timer" style="font-size:3rem; color:#ffaf7b; font-weight:900;">10</div>
        <h2 id="turn-txt" style="color:var(--neon); margin:5px 0;"></h2>
        
        <div class="grid" id="main-grid">
            <script>for(let i=1; i<=10; i++) document.write(`<button class="num-btn" id="btn-${i}" onclick="ask(${i})">${i}</button>`);</script>
        </div>
        <div class="rights-label">👨‍💻 Leba, AAA | 🎨 mesh</div>
    </div>

    <div id="q-modal" class="overlay">
        <div class="content-box">
            <div id="q-timer" style="font-size:3.5rem; color:red; text-align:center; font-weight:900;">30</div>
            <h2 id="q-text" style="text-align:center; line-height:1.4;"></h2>
            <div id="ans-box" style="display:none; color:var(--victory); text-align:center; margin:10px; font-weight:bold;">الإجابة: <span id="ans-val"></span></div>
            <button onclick="document.getElementById('ans-box').style.display='block'" style="width:100%; margin-bottom:10px;">كشف الإجابة</button>
            <div style="display:flex; gap:10px; justify-content:center;">
                <button onclick="handleResult(true)" style="background:var(--victory); color:white; padding:12px 40px; border-radius:10px; border:none; cursor:pointer; font-weight:bold;">صح ✅</button>
                <button onclick="handleResult(false)" style="background:var(--danger); color:white; padding:12px 40px; border-radius:10px; border:none; cursor:pointer; font-weight:bold;">خطأ ❌</button>
            </div>
        </div>
    </div>

            let list = (p === 1 ? p1Cats : p2Cats);
            if(list.includes(cat)) list.splice(list.indexOf(cat), 1);
            else if(list.length < 2) list.push(cat);
            updateSetupUI();
        }

        function updateSetupUI() {
            document.querySelectorAll('#p1-cats .cat-card, #p2-cats .cat-card').forEach(c => {
                const p = (c.parentElement.id === 'p1-cats' ? 1 : 2);
                const name = c.innerText.replace(/[^\u0621-\u064A]/g, "");
                c.className = (p === 1 ? p1Cats : p2Cats).includes(name) ? 'cat-card selected' : 'cat-card';
            });
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pause-btn').innerText = isPaused ? "▶️ استكمال" : "⏸️ إيقاف";
            document.getElementById('paused-msg').style.display = isPaused ? 'flex' : 'none';
        }

        function resetNumbers() {
            for(let i=1; i<=10; i++) document.getElementById(`btn-${i}`).disabled = false;
        }

        function startGame() {
            if(p1Cats.length < 2 || p2Cats.length < 2) return alert("اختاروا قسمين لكل فريق!");
            p1Name = document.getElementById('p1-name').value;
            p2Name = document.getElementById('p2-name').value;
            winLimit = parseInt(document.getElementById('score-limit').value);
            tLimit = parseInt(document.getElementById('time-limit').value);
            choiceLimit = parseInt(document.getElementById('choice-limit-input').value);
            diff = document.getElementById('diff-select').value;
            
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('label-p1').innerText = p1Name;
            document.getElementById('label-p2').innerText = p2Name;
            updateTurnTxt();
            startChoiceTimer();
        }

        function ask(val) {
            if(isPaused) return;
            clearInterval(choiceInt);
            playSound('click');
            curVal = val;
            const myCats = (turn === 1 ? p1Cats : p2Cats);
            const catName = myCats[Math.floor(Math.random() * myCats.length)];
            let pool = masterBank[catName].filter(q => !usedQuestions[catName].includes(q.q));
            
            if(diff === 'easy') pool = pool.slice(0, 30);
            else if(diff === 'med') pool = pool.slice(30, 70);
            else if(diff === 'hard') pool = pool.slice(70, 100);

            if(pool.length === 0) { usedQuestions[catName] = []; pool = masterBank[catName]; }
            const q = pool[Math.floor(Math.random() * pool.length)];
            usedQuestions[catName].push(q.q);

            document.getElementById('q-cat-name').innerText = `قسم: ${catName}`;
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('ans-val').innerText = q.a;
            document.getElementById('ans-box').style.display = 'none';
            document.getElementById('q-modal').style.display = 'flex';
            document.getElementById(`btn-${val}`).disabled = true;
            timeRem = tLimit;
            startTimer();
        }

        function startTimer() {
            document.getElementById('q-timer').innerText = timeRem;
            clearInterval(timerInt);
            timerInt = setInterval(() => {
                if(!isPaused) {
                    timeRem--;
                    document.getElementById('q-timer').innerText = timeRem;
                    if(timeRem <= 0) { clearInterval(timerInt); handleResult(false); }
                }
            }, 1000);
        }

        function startChoiceTimer() {
            choiceRem = choiceLimit;
            document.getElementById('choice-timer').innerText = choiceRem;
            clearInterval(choiceInt);
            choiceInt = setInterval(() => {
                if(!isPaused) {
                    choiceRem--;
                    document.getElementById('choice-timer').innerText = choiceRem;
                    if(choiceRem <= 0) {
                        clearInterval(choiceInt);
                        turn = (turn === 1 ? 2 : 1);
                        updateTurnTxt();
                        startChoiceTimer();
                    }
                }
            }, 1000);
        }

        function handleResult(correct) {
            clearInterval(timerInt);
            document.getElementById('q-modal').style.display = 'none';
            scores[turn] += correct ? curVal : (curVal * 2);
            updateUI();
            
            if(scores[turn] >= winLimit) {
                const loser = (turn === 1 ? p1Name : p2Name);
                document.getElementById('loser-display').innerText = "الخاسر: " + loser;
                playSound('boom'); setTimeout(() => playSound('laugh'), 1200);
                document.getElementById('wasted-screen').style.display = 'flex';
                setTimeout(() => location.reload(), 8000);
            } else {
                turn = (turn === 1 ? 2 : 1);
                updateTurnTxt();
                startChoiceTimer();
            }
        }

        function updateUI() {
            document.getElementById('s1').innerText = scores[1];
            document.getElementById('s2').innerText = scores[2];
            let angle = (scores[1] - scores[2]) * -2.5;
            document.getElementById('beam').style.transform = `rotate(${angle}deg)`;
        }

        function updateTurnTxt() {
            document.getElementById('turn-txt').innerText = `دور: ${turn === 1 ? p1Name : p2Name}`;
        }
    </script>
</body>
</html>
