<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ميزان سولار - النسخة النهائية</title>
    <style>
        :root {
            --glow-cyan: #4facfe; --neon-blue: #00f2fe; --danger: #ff4b2b; --victory: #2ecc71;
            --galaxy: linear-gradient(135deg, #3a1c71, #d76d77, #ffaf7b, #4facfe);
        }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma; background-color: #050510; color: white; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .animated-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('bg.jpd') center/cover no-repeat; z-index: -2; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); z-index: 5000; justify-content: center; align-items: center; }
        .content-box { background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); max-width: 500px; text-align: right; width: 90%; }
        
        .controls-top { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 1000; }
        .btn-ctrl { background: rgba(255,255,255,0.1); border: 1.5px solid rgba(255,255,255,0.2); color: white; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-ctrl:hover { background: var(--neon-blue); color: black; }

        #setup-screen { position: fixed; inset: 0; background: rgba(5,5,15,0.4); backdrop-filter: blur(25px); z-index: 4000; display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 40px; padding: 20px; }
        
        /* الشروط مرتبة على اليمين */
        .rules-side { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; border-right: 3px solid var(--neon-blue); max-width: 250px; display: flex; flex-direction: column; gap: 15px; text-align: right; }
        .rules-side b { color: var(--neon-blue); font-size: 1.2rem; margin-bottom: 5px; }
        .rules-side p { margin: 0; font-size: 0.95rem; line-height: 1.4; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }

        .setup-main { display: flex; flex-direction: column; align-items: center; }
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .config-grid input, .config-grid select { background: rgba(0,0,0,0.5); color: white; border: 1px solid #444; padding: 8px; border-radius: 5px; width: 140px; }

        .main-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px; width: 95%; max-width: 900px; padding: 30px; text-align: center; position: relative; }
        .beam { width: 500px; height: 10px; background: #fff; position: absolute; bottom: 80px; transition: 0.8s; left: 50%; margin-left: -250px; }
        .cup { width: 130px; height: 60px; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); border: 2px solid #fff; border-radius: 0 0 70px 70px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-top: 100px; }
        .num-btn { padding: 18px; font-size: 1.5rem; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 15px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .num-btn:disabled { opacity: 0.1; border-color: red; }

        .cat-card { padding: 10px; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; cursor: pointer; margin: 5px 0; text-align: center; width: 100%; background: rgba(255,255,255,0.05); }
        .cat-card.selected { background: var(--neon-blue); color: black; font-weight: bold; }
        
        #wasted-screen { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
        #timer-display { font-size: 3.5rem; font-weight: 900; color: var(--danger); text-shadow: 0 0 15px rgba(255,75,43,0.5); }
        .paused-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); z-index: 2000; border-radius: 40px; align-items: center; justify-content: center; font-size: 3rem; color: gold; font-weight: bold; }
    </style>
</head>
<body>

    <div id="wasted-screen">
        <h1 style="color:red; font-size:8rem; font-weight:900; margin:0;">WASTED</h1>
        <div id="loser-display" style="color:white; font-size:3rem;"></div>
    </div>
    <div class="animated-bg"></div>

    <div class="controls-top">
        <button class="btn-ctrl" onclick="togglePause()" id="pause-btn">⏸️ إيقاف مؤقت</button>
        <button class="btn-ctrl" onclick="resetNumbers()">🔓 تصفير الأرقام</button>
        <button class="btn-ctrl" onclick="location.reload()">🔙 رجوع</button>
    </div>

    <div id="setup-screen">
        <div class="rules-side">
            <b>📜 الشروط:</b>
            <p>1. كل فريق يختار قسمين تخصص.</p>
            <p>2. الخطأ يضيف ضعف الرقم المختار للميزان.</p>
            <p>3. السؤال لا يتكرر حتى نفاذ القسم.</p>
            <p>4. يخسر من يسبب انفجار الميزان.</p>
        </div>

        <div class="setup-main">
            <div style="display:flex; align-items:center; gap:15px; margin-bottom:20px;">

                <h1 style="font-size:3rem; background: var(--galaxy); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin:0;">SOLAR</h1>
            </div>

            <div class="config-grid">

                <label>الوقت:</label><input type="number" id="time-limit" value="30">
                <label>الحد:</label><input type="number" id="score-limit" value="50">
                <label>المستوى:</label>
                <select id="diff-select">
                    <option value="all">كل المستويات</option>

                    <option value="med">متوسط (31-70)</option>
                    <option value="hard">صعب (71-100)</option>
                </select>
            </div>

            <div style="display:flex; gap:20px; margin-top:15px;">
                <div id="p1-cats" style="width:150px;">
                    <div class="cat-card" onclick="setCat(1, 'عام')">عام</div><div class="cat-card" onclick="setCat(1, 'دين')">دين</div>
                    <div class="cat-card" onclick="setCat(1, 'كورة')">كورة</div><div class="cat-card" onclick="setCat(1, 'ثقافة')">ثقافة</div>
                </div>
                <div id="p2-cats" style="width:150px;">
                    <div class="cat-card" onclick="setCat(2, 'عام')">عام</div><div class="cat-card" onclick="setCat(2, 'دين')">دين</div>
                    <div class="cat-card" onclick="setCat(2, 'كورة')">كورة</div><div class="cat-card" onclick="setCat(2, 'ثقافة')">ثقافة</div>
                </div>
            </div>
            
            <button onclick="startGame()" style="margin-top:20px; padding:15px 80px; background:var(--victory); border:none; border-radius:50px; color:white; font-weight:bold; cursor:pointer; font-size:1.3rem;">انطـلاق 🚀</button>
            <div style="font-size:0.8rem; margin-top:10px; opacity:0.6;">👨‍💻 Leba, AAA | 🎨 mesh | ⚔️ العشرينات</div>
        </div>
    </div>

    <div class="main-card" id="game-ui" style="display:none;">
        <div id="game-paused-msg" class="paused-overlay">لعبة متوقفة ⏸️</div>
        <div style="height: 100px; position: relative;">
            <div class="beam" id="beam">
                <div class="cup" style="position:absolute; left:-10px; bottom:-60px;"><small id="label-p1"></small><b id="s1">0</b></div>
                <div class="cup" style="position:absolute; right:-10px; bottom:-60px;"><small id="label-p2"></small><b id="s2">0</b></div>
            </div>
        </div>
        <h2 id="turn-txt" style="color:var(--neon-blue); margin-top:120px; font-size: 2.2rem;"></h2>
        <div class="grid">
            <script>for(let i=1; i<=10; i++) document.write(`<button class="num-btn" id="btn-${i}" onclick="ask(${i})">${i}</button>`);</script>
        </div>
        <div style="font-size:0.8rem; margin-top:40px; opacity:0.5;">👨‍💻 Leba, AAA | 🎨 mesh</div>
    </div>

    <div id="q-modal" class="overlay">
        <div class="content-box">
            <div id="timer-display">30</div>
            <h2 id="q-text" style="text-align:center; font-size:1.8rem;"></h2>

            <div style="display:flex; gap:10px; justify-content:center;">

        </div>
    </div>

        function playSound(type) {
            let s = document.getElementById('sound-' + type);
            if (s) { s.currentTime = 0; s.play(); }
        }

        function setCat(p, cat) {
            let list = (p === 1 ? p1Cats : p2Cats);
            if(list.includes(cat)) list.splice(list.indexOf(cat), 1);
            else if(list.length < 2) list.push(cat);
            updateSetupUI();
        }

        function updateSetupUI() {
            document.querySelectorAll('.cat-card').forEach(c => {
                const p = (c.parentElement.id === 'p1-cats' ? 1 : 2);
                c.className = (p === 1 ? p1Cats : p2Cats).includes(c.innerText) ? 'cat-card selected' : 'cat-card';
            });
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pause-btn').innerText = isPaused ? "▶️ استكمال" : "⏸️ إيقاف مؤقت";
            document.getElementById('game-paused-msg').style.display = isPaused ? 'flex' : 'none';
        }

        function resetNumbers() {
            for(let i=1; i<=10; i++) document.getElementById(`btn-${i}`).disabled = false;
        }

        function startGame() {
            if(p1Cats.length < 2 || p2Cats.length < 2) return alert("اختاروا قسمين لكل فريق!");
            p1Name = document.getElementById('p1-name').value;
            p2Name = document.getElementById('p2-name').value;
            winLimit = parseInt(document.getElementById('score-limit').value);
            tLimit = parseInt(document.getElementById('time-limit').value);
            diff = document.getElementById('diff-select').value;
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('label-p1').innerText = p1Name;
            document.getElementById('label-p2').innerText = p2Name;
            updateTurnTxt();
        }

        function ask(val) {
            if(isPaused) return;
            playSound('click');
            curVal = val;
            const myCats = (turn === 1 ? p1Cats : p2Cats);
            const catName = myCats[Math.floor(Math.random() * myCats.length)];
            let pool = masterBank[catName].filter(q => !usedQuestions[catName].includes(q.q));
            
            if(diff === 'easy') pool = pool.slice(0, 30);
            else if(diff === 'med') pool = pool.slice(30, 70);
            else if(diff === 'hard') pool = pool.slice(70, 100);

            if(pool.length === 0) { usedQuestions[catName] = []; pool = masterBank[catName]; }
            const q = pool[Math.floor(Math.random() * pool.length)];
            usedQuestions[catName].push(q.q);

            document.getElementById('q-text').innerText = q.q;
            document.getElementById('ans-val').innerText = q.a;
            document.getElementById('ans-box').style.display = 'none';
            document.getElementById('q-modal').style.display = 'flex';
            document.getElementById(`btn-${val}`).disabled = true;
            timeRem = tLimit;
            startTimer();
        }

        function startTimer() {
            document.getElementById('timer-display').innerText = timeRem;
            clearInterval(timerInt);
            timerInt = setInterval(() => {
                if(!isPaused) {
                    timeRem--;
                    document.getElementById('timer-display').innerText = timeRem;
                    if(timeRem <= 0) { clearInterval(timerInt); handleResult(false); }
                }
            }, 1000);
        }

        function handleResult(correct) {
            clearInterval(timerInt);
            document.getElementById('q-modal').style.display = 'none';
            scores[turn] += correct ? curVal : (curVal * 2);
            updateUI();
            if(scores[1] + scores[2] >= winLimit) {
                const loser = (turn === 1 ? p1Name : p2Name);
                document.getElementById('loser-display').innerText = "الخاسر: " + loser;
                playSound('boom'); setTimeout(() => playSound('laugh'), 1200);
                document.getElementById('wasted-screen').style.display = 'flex';
                setTimeout(() => location.reload(), 7000);
            } else {
                turn = (turn === 1 ? 2 : 1);
                updateTurnTxt();
            }
        }

        function updateUI() {
            document.getElementById('s1').innerText = scores[1];
            document.getElementById('s2').innerText = scores[2];
            let angle = (scores[1] - scores[2]) * -2.5;
            document.getElementById('beam').style.transform = `rotate(${angle}deg)`;
        }

        function updateTurnTxt() {
            document.getElementById('turn-txt').innerText = `دور: ${turn === 1 ? p1Name : p2Name}`;
        }
    </script>
