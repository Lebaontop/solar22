<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ميزان سولار - Solar </title>
    <style>
        :root {
            --glow-cyan: #4facfe; --neon-blue: #00f2fe; --danger: #ff4b2b; --victory: #2ecc71;
            --galaxy: linear-gradient(135deg, #3a1c71, #d76d77, #ffaf7b, #4facfe);
        }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma; background-color: #050510; color: white; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .animated-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #050510; z-index: -2; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 5000; justify-content: center; align-items: center; }
        .content-box { background: rgba(10,10,25,0.95); padding: 30px; border-radius: 20px; border: 1px solid var(--glow-cyan); max-width: 500px; text-align: right; width: 90%; }
        .controls-top { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 1000; }
        .btn-ctrl { background: rgba(255,255,255,0.1); border: 1.5px solid rgba(255,255,255,0.3); color: white; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .logo-area { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .logo-box { width: 60px; height: 60px; border: 2px solid #fff; border-radius: 12px; background: #222; }
        .logo-text { font-size: 3rem; font-weight: 900; background: var(--galaxy); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #setup-screen { position: fixed; inset: 0; background: #050510; z-index: 4000; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow-y: auto; padding: 20px; }
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; border: 1px solid var(--neon-blue); }
        .config-grid input { background: #000; color: white; border: 1px solid #444; padding: 8px; border-radius: 5px; width: 150px; }
        .main-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 40px; width: 95%; max-width: 900px; padding: 30px; text-align: center; position: relative; }
        .beam { width: 500px; height: 10px; background: #fff; position: absolute; bottom: 100px; transition: 0.8s; left: 50%; margin-left: -250px; }
        .cup { width: 130px; height: 60px; background: rgba(0,0,0,0.8); border: 2px solid #fff; border-radius: 0 0 70px 70px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-top: 80px; }
        .num-btn { padding: 20px; font-size: 1.5rem; background: rgba(255,255,255,0.1); border: 1px solid #444; color: white; border-radius: 15px; cursor: pointer; font-weight: bold; }
        .num-btn:disabled { opacity: 0.1; border-color: red; }
        .cat-card { padding: 12px; border: 1px solid #444; border-radius: 10px; cursor: pointer; margin: 5px 0; text-align: center; width: 100%; }
        .cat-card.selected { background: var(--neon-blue); color: black; font-weight: bold; }
        #wasted-screen { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center; color: red; font-size: 8rem; font-weight: 900; }
    </style>
</head>
<body>

    <div id="wasted-screen">WASTED</div>
    <div class="animated-bg"></div>

    <div class="controls-top">
        <button class="btn-ctrl" onclick="toggleOverlay('info-modal')">ℹ️ الشرح</button>
        <button class="btn-ctrl" onclick="resetNumbers()">🔓 ريستارت الأرقام</button>
        <button class="btn-ctrl" onclick="location.reload()">⚙️ الإعدادات</button>
    </div>

    <div id="setup-screen">
        <div class="logo-area"><div class="logo-box"></div><h1 class="logo-text">SOLAR</h1></div>
        <div class="config-grid">
            <label>فريق 1:</label><input type="text" id="p1-name" value="الفريق 1">
            <label>فريق 2:</label><input type="text" id="p2-name" value="الفريق 2">
            <label>الوقت:</label><input type="number" id="time-limit" value="30">
            <label>حد الانفجار:</label><input type="number" id="score-limit" value="50">
        </div>
        <div style="display:flex; gap:30px; margin-top:20px;">
            <div id="p1-cats"><h3>أقسام فريق 1:</h3>
                <div class="cat-card" onclick="setCat(1, 'عام')">عام</div><div class="cat-card" onclick="setCat(1, 'دين')">دين</div>
                <div class="cat-card" onclick="setCat(1, 'كورة')">كورة</div><div class="cat-card" onclick="setCat(1, 'ثقافة')">ثقافة</div>
            </div>
            <div id="p2-cats"><h3>أقسام فريق 2:</h3>
                <div class="cat-card" onclick="setCat(2, 'عام')">عام</div><div class="cat-card" onclick="setCat(2, 'دين')">دين</div>
                <div class="cat-card" onclick="setCat(2, 'كورة')">كورة</div><div class="cat-card" onclick="setCat(2, 'ثقافة')">ثقافة</div>
            </div>
        </div>
        <button onclick="startGame()" style="margin-top:30px; padding:15px 80px; background:var(--victory); border-radius:50px; color:white; cursor:pointer;">ابدأ الجولة 🚀</button>
    </div>

    <div class="main-card" id="game-ui" style="display:none;">
        <div style="height: 100px; position: relative;">
            <div class="beam" id="beam">
                <div class="cup" style="position:absolute; left:-10px; bottom:-60px;"><small id="label-p1"></small><b id="s1">0</b></div>
                <div class="cup" style="position:absolute; right:-10px; bottom:-60px;"><small id="label-p2"></small><b id="s2">0</b></div>
            </div>
        </div>
        <h2 id="turn-txt" style="color:var(--neon-blue); margin-top:120px;"></h2>
        <div class="grid">
            <script>for(let i=1; i<=10; i++) document.write(`<button class="num-btn" id="btn-${i}" onclick="ask(${i})">${i}</button>`);</script>
        </div>
    </div>

    <div id="q-modal" class="overlay">
        <div class="content-box">
            <div id="timer-display" style="font-size:3rem; color:red; text-align:center;">30</div>
            <h2 id="q-text" style="text-align:center;"></h2>
            <div id="ans-box" style="display:none; color:green; text-align:center; margin:10px;">الإجابة: <span id="ans-val"></span></div>
            <button onclick="document.getElementById('ans-box').style.display='block'" style="width:100%; margin-bottom:10px;">كشف الإجابة</button>
            <div style="display:flex; gap:10px; justify-content:center;">
                <button onclick="handleResult(true)" style="background:green; color:white; padding:10px 30px;">صح</button>
                <button onclick="handleResult(false)" style="background:red; color:white; padding:10px 30px;">خطأ</button>
            </div>
        </div>
    </div>

    <div id="info-modal" class="overlay" onclick="this.style.display='none'">
        <div class="content-box">
            <h2>💎 حقوق اللعبة</h2>
            <p>المبرمجين: Leba, AAA | المصمم: mesh</p>
            <p>كل فريق يختار قسمين. السؤال لا يتكرر حتى تنتهي أسئلة القسم بالكامل.</p>
        </div>
    </div>

        function toggleOverlay(id) { document.getElementById(id).style.display = 'flex'; }
        function setCat(p, cat) {
            let list = (p === 1) ? p1Cats : p2Cats;
            if(list.includes(cat)) list.splice(list.indexOf(cat), 1);
            else if(list.length < 2) list.push(cat);
            updateSetupUI();
        }
        function updateSetupUI() {
            document.querySelectorAll('.cat-card').forEach(c => {
                const p = c.parentElement.id === 'p1-cats' ? 1 : 2;
                c.className = (p === 1 ? p1Cats : p2Cats).includes(c.innerText) ? 'cat-card selected' : 'cat-card';
            });
        }
        function resetNumbers() {
            for(let i=1; i<=10; i++) document.getElementById(`btn-${i}`).disabled = false;
        }
        function startGame() {
            if(p1Cats.length < 2 || p2Cats.length < 2) return alert("اختار قسمين لكل فريق!");
            p1Name = document.getElementById('p1-name').value;
            p2Name = document.getElementById('p2-name').value;
            winLimit = document.getElementById('score-limit').value;
            tLimit = document.getElementById('time-limit').value;
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('label-p1').innerText = p1Name;
            document.getElementById('label-p2').innerText = p2Name;
            updateTurnTxt();
        }
        function ask(val) {
            curVal = val;
            const myCats = (turn === 1) ? p1Cats : p2Cats;
            const cat = myCats[Math.floor(Math.random() * myCats.length)];
            let pool = masterBank[cat].filter(q => !usedQuestions[cat].includes(q.q));
            if(pool.length === 0) { usedQuestions[cat] = []; pool = masterBank[cat]; }
            const q = pool[Math.floor(Math.random() * pool.length)];
            usedQuestions[cat].push(q.q);
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('ans-val').innerText = q.a;
            document.getElementById('ans-box').style.display = 'none';
            document.getElementById('q-modal').style.display = 'flex';
            document.getElementById(`btn-${val}`).disabled = true;
            startTimer();
        }
        function startTimer() {
            let rem = tLimit;
            document.getElementById('timer-display').innerText = rem;
            clearInterval(timerInt);
            timerInt = setInterval(() => { rem--; document.getElementById('timer-display').innerText = rem; if(rem<=0){clearInterval(timerInt); handleResult(false);} }, 1000);
        }
        function handleResult(correct) {
            clearInterval(timerInt);
            document.getElementById('q-modal').style.display = 'none';
            scores[turn] += correct ? curVal : (curVal * 2);
            updateUI();
            if(scores[1]+scores[2] >= winLimit) { document.getElementById('wasted-screen').style.display = 'flex'; setTimeout(()=>location.reload(), 3000); }
            else { turn = turn === 1 ? 2 : 1; updateTurnTxt(); }
        }
        function updateUI() {
            document.getElementById('s1').innerText = scores[1];
            document.getElementById('s2').innerText = scores[2];
            let angle = (scores[1] - scores[2]) * -2.5;
            document.getElementById('beam').style.transform = `rotate(${angle}deg)`;
        }
        function updateTurnTxt() { document.getElementById('turn-txt').innerText = `دور: ${turn === 1 ? p1Name : p2Name}`; }
