<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ميزان سولار</title>
    <style>
        :root {
            --glow: #4facfe; --neon: #00f2fe; --danger: #ff4b2b; --victory: #2ecc71;
            --galaxy: linear-gradient(135deg, #3a1c71, #d76d77, #ffaf7b, #4facfe);
        }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma; background-color: #050510; color: white; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .animated-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('bg.jpd') center/cover no-repeat; z-index: -2; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); z-index: 5000; justify-content: center; align-items: center; }
        .content-box { background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); max-width: 500px; text-align: right; width: 90%; }
        .controls-top { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 1000; }
        .btn-ctrl { background: rgba(255,255,255,0.1); border: 1.5px solid rgba(255,255,255,0.2); color: white; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        
        #setup-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(35px); z-index: 4000; display: flex; align-items: center; justify-content: center; gap: 40px; padding: 20px; }
        .rules-side { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; border-right: 4px solid var(--neon); width: 220px; }
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; }
        .config-grid input, .config-grid select { background: rgba(0,0,0,0.7); color: white; border: 1px solid #444; padding: 5px; border-radius: 5px; width: 120px; }

        .main-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; width: 90%; max-width: 900px; padding: 20px; text-align: center; position: relative; }
        
        /* الميزان فوق الأرقام */
        .balance-container { height: 130px; display: flex; justify-content: center; align-items: flex-end; position: relative; margin-bottom: 20px; }
        .beam { width: 450px; height: 10px; background: #fff; position: relative; transition: 0.8s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        .cup { width: 120px; height: 60px; background: rgba(0,0,0,0.8); border: 2px solid #fff; border-radius: 0 0 60px 60px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; padding: 0 100px; }
        .num-btn { padding: 15px; font-size: 1.5rem; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 12px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .num-btn:disabled { opacity: 0.1; border-color: red; }

        .cat-card { padding: 10px; border: 1px solid #444; border-radius: 8px; cursor: pointer; margin: 3px 0; text-align: center; background: rgba(255,255,255,0.05); }
        .cat-card.selected { background: var(--neon); color: black; font-weight: bold; }
        
        @keyframes wasted-anim { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        #wasted-screen { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
        #wasted-title { color: red; font-size: 8rem; font-weight: 900; animation: wasted-anim 1s infinite; margin: 0; letter-spacing: 10px; }
        .rights { font-size: 0.8rem; opacity: 0.6; color: var(--glow); margin-top: 15px; }
    </style>
</head>
<body>

    <div id="wasted-screen">
        <h1 id="wasted-title">WASTED</h1>
        <div id="loser-display" style="color:white; font-size:3rem; text-shadow: 0 0 20px red;"></div>
    </div>
    <div class="animated-bg"></div>

        <button class="btn-ctrl" onclick="location.reload()">رجوع</button>
    </div>

                </div>
                <div id="p2-cats" style="width:140px;">
                    <div class="cat-card" onclick="setCat(2, 'عام')">🧠 عام</div><div class="cat-card" onclick="setCat(2, 'دين')">🕋 دين</div>
                    <div class="cat-card" onclick="setCat(2, 'كورة')">⚽ كورة</div><div class="cat-card" onclick="setCat(2, 'ثقافة')">📚 ثقافة</div>
                </div>
            </div>
            <button onclick="startGame()" style="margin-top:20px; padding:12px 60px; background:var(--victory); border:none; border-radius:50px; color:white; font-weight:bold; cursor:pointer;">انطلاق 🚀</button>
            <div class="rights">👨‍💻 Leba, AAA | 🎨 mesh</div>
        </div>
    </div>

    <div class="main-card" id="game-ui" style="display:none;">
        <div id="paused-msg" class="overlay" style="background:rgba(0,0,0,0.7); position:absolute; border-radius:40px;">لعبة متوقفة ⏸️</div>
        
        <div class="balance-container">
            <div class="beam" id="beam">

                <div class="cup" style="position:absolute; right:-10px; bottom:-65px;"><small id="label-p2"></small><b id="s2">0</b></div>
            </div>
        </div>

        <h2 id="turn-txt" style="color:var(--neon); margin:10px 0;"></h2>

        <div class="grid">
            <script>for(let i=1; i<=10; i++) document.write(`<button class="num-btn" id="btn-${i}" onclick="ask(${i})">${i}</button>`);</script>
        </div>
        <div class="rights">👨‍💻 Leba, AAA | 🎨 mesh</div>
    </div>

            updateTurnTxt();
            startChoiceTimer();

                        startChoiceTimer();

            }, 1000);

        function ask(val) {
            if(isPaused) return;
            clearInterval(choiceInt);
            playSound('click');
            curVal = val;
            const myCats = (turn === 1 ? p1Cats : p2Cats);
            const catName = myCats[Math.floor(Math.random() * myCats.length)];
            let pool = masterBank[catName].filter(q => !usedQuestions[catName].includes(q.q));
            
            if(diff === 'easy') pool = pool.slice(0, 30);
            else if(diff === 'med') pool = pool.slice(30, 70);
            else if(diff === 'hard') pool = pool.slice(70, 100);

            if(pool.length === 0) { usedQuestions[catName] = []; pool = masterBank[catName]; }
            const q = pool[Math.floor(Math.random() * pool.length)];
            usedQuestions[catName].push(q.q);

            document.getElementById('q-text').innerText = q.q;
            document.getElementById('ans-val').innerText = q.a;
            document.getElementById('ans-box').style.display = 'none';
            document.getElementById('q-modal').style.display = 'flex';
            document.getElementById(`btn-${val}`).disabled = true;
            timeRem = tLimit;
            startTimer();
        }

        function startTimer() {
            document.getElementById('q-timer').innerText = timeRem;
            clearInterval(timerInt);
            timerInt = setInterval(() => {
                if(!isPaused) {
                    timeRem--;
                    document.getElementById('q-timer').innerText = timeRem;
                    if(timeRem <= 0) { clearInterval(timerInt); handleResult(false); }
                }
            }, 1000);
        }

        function handleResult(correct) {
            clearInterval(timerInt);
            document.getElementById('q-modal').style.display = 'none';
            scores[turn] += correct ? curVal : (curVal * 2);
            updateUI();
            
            if(scores[turn] >= winLimit) {
                const loser = (turn === 1 ? p1Name : p2Name);
                document.getElementById('loser-display').innerText = "الخاسر: " + loser;
                playSound('boom'); setTimeout(() => playSound('laugh'), 1000);
                document.getElementById('wasted-screen').style.display = 'flex';
                setTimeout(() => location.reload(), 8000);
            } else {
                turn = (turn === 1 ? 2 : 1);
                updateTurnTxt();
                startChoiceTimer();
            }
        }

        function updateUI() {
            document.getElementById('s1').innerText = scores[1];
            document.getElementById('s2').innerText = scores[2];
            let angle = (scores[1] - scores[2]) * -2.5;
            document.getElementById('beam').style.transform = `rotate(${angle}deg)`;

        function updateTurnTxt() {
            document.getElementById('turn-txt').innerText = `دور: ${turn === 1 ? p1Name : p2Name}`;
